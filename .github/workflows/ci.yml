name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v1.2.3 or latest)"
        required: false
        default: "latest"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          version: "0.10.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          version: "0.10.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    permissions:
      contents: read
      packages: write  # push to GHCR
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set image vars
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          TAG="${GITHUB_REF_NAME}"
          BASE="ghcr.io/${OWNER}/youtube-download-bot"
          echo "REPO_OWNER_LC=${OWNER}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${BASE}:${TAG}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${BASE}:latest" >> $GITHUB_ENV
          echo "image_tag=${BASE}:${TAG}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_LATEST }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, Linux, X64, tg-audio-dl]
    # always() prevents GitHub from skipping deploy when build was skipped (workflow_dispatch path)
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success') ||
        github.event_name == 'workflow_dispatch'
      )
    needs: [build]
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set image vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          BASE="ghcr.io/${OWNER}/youtube-download-bot"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${BASE}:${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          fi
          echo "REPO_OWNER_LC=${OWNER}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Deploy from runner
        env:
          GHCR_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ env.REPO_OWNER_LC }}
          GHCR_IMAGE: ${{ env.IMAGE_TAG }}
          DEPLOY_SSH_ALIAS: tg-audio-dl-vprojects
        run: scripts/deploy.sh
