name: Update yt-dlp

on:
  schedule:
    - cron: "0 3 * * *"  # Every day at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  # Supply-chain cooldown: never adopt a release younger than this many days,
  # so a compromised upload is likely yanked before we ever lock it.
  YTDLP_COOLDOWN_DAYS: "3"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0  # needed to read tags for version bump

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
        with:
          version: "0.10.10"

      - name: Resolve cooldown-compliant yt-dlp version
        id: target
        run: |
          curl -sf https://pypi.org/pypi/yt-dlp/json -o /tmp/ytdlp.json
          TARGET=$(python3 - <<'PY'
          import datetime
          import json
          import os

          cooldown = datetime.timedelta(days=int(os.environ["YTDLP_COOLDOWN_DAYS"]))
          now = datetime.datetime.now(datetime.timezone.utc)
          with open("/tmp/ytdlp.json") as f:
              data = json.load(f)

          best = None
          for version, files in data["releases"].items():
              if not files or any(f.get("yanked") for f in files):
                  continue
              # Stable releases only (yt-dlp uses YYYY.M.D); skip dev/rc builds.
              parts = version.split(".")
              if not all(p.isdigit() for p in parts):
                  continue
              uploaded = min(
                  datetime.datetime.fromisoformat(f["upload_time_iso_8601"])
                  for f in files
              )
              if now - uploaded < cooldown:
                  continue
              key = tuple(int(p) for p in parts)
              if best is None or key > best[0]:
                  best = (key, version)

          print(best[1] if best else "")
          PY
          )
          if [ -z "$TARGET" ]; then
            echo "::error::No cooldown-compliant yt-dlp release found on PyPI"
            exit 1
          fi
          echo "Cooldown-compliant target: $TARGET"
          echo "version=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Update yt-dlp
        run: uv lock --upgrade-package "yt-dlp==${{ steps.target.outputs.version }}"

      - name: Detect version change
        id: check
        run: |
          locked_ytdlp() {
            grep -A1 '^name = "yt-dlp"$' <<<"$1" | grep '^version' | cut -d'"' -f2
          }
          if git diff --quiet uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            OLD=$(locked_ytdlp "$(git show HEAD:uv.lock)")
            NEW=$(locked_ytdlp "$(cat uv.lock)")
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "old=${OLD}"    >> "$GITHUB_OUTPUT"
            echo "new=${NEW}"    >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch tag and push
        if: steps.check.outputs.changed == 'true'
        env:
          OLD: ${{ steps.check.outputs.old }}
          NEW: ${{ steps.check.outputs.new }}
        run: |
          LATEST=$(git describe --tags --abbrev=0)
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: bump yt-dlp ${OLD} → ${NEW}"
          git tag "$NEW_TAG"
          git push origin HEAD:master "$NEW_TAG"
