name: youtube-download-bot

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:7.11
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-api-data:/var/lib/telegram-bot-api
    networks:
      - internal
    # No ports exposed to host — only internal network
    security_opt:
      - no-new-privileges:true
    # cap_drop: ALL not viable — third-party image needs unknown capabilities at startup
    mem_limit: 256m
    cpus: "0.5"
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
    healthcheck:
      # Healthy = the server answered at all. First wget covers a silent 2xx
      # (exit 0, no output); the fallback treats any non-connection-refused
      # error output (e.g. the 404 served on /) as "up".
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8081 2>/dev/null || wget -qO /dev/null http://127.0.0.1:8081 2>&1 | grep -qv 'Connection refused'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  bot:
    # Local dev: built from source. Production: pulled from GHCR via GHCR_IMAGE in .env
    image: ${GHCR_IMAGE:-youtube-download-bot}
    build: .
    restart: unless-stopped
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    env_file: .env
    environment:
      TELEGRAM_LOCAL_SERVER_URL: http://telegram-bot-api:8081
    extra_hosts:
      - "host.docker.internal:10.0.0.65"
    volumes:
      - ./cache:/app/cache:rw
    networks:
      - internal
    # Hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=512m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    healthcheck:
      # Observability only: healthy = heartbeat file refreshed recently (the
      # bot rewrites it after each successful getMe). Actual self-recovery is
      # the in-process watchdog thread, which force-exits on a stale heartbeat
      # so the restart policy kicks in — Compose does not restart a container
      # just for being "unhealthy". Still far better than the old PID-only
      # check, which reported "healthy" while the bot was actually dead.
      # Deadline mirrors the watchdog (interval*max_failures + probe_timeout),
      # read from the same HEARTBEAT_* env so it tracks config; the defaults
      # below match src/config.py.
      test:
        - CMD-SHELL
        - >-
          python -c "import os,time,pathlib,sys;
          i=float(os.getenv('HEARTBEAT_INTERVAL_SECONDS','30'));
          f=float(os.getenv('HEARTBEAT_MAX_FAILURES','3'));
          t=float(os.getenv('HEARTBEAT_PROBE_TIMEOUT_SECONDS','20'));
          p=pathlib.Path('/tmp/bot_heartbeat');
          sys.exit(0 if p.is_file() and time.time()-float(p.read_text())<i*f+t else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    mem_limit: 512m
    cpus: "1.5"
    # No ports — bot only needs outbound connections

networks:
  internal:
    driver: bridge
    internal: false  # needs internet for YouTube

volumes:
  telegram-api-data:
