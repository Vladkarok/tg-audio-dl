name: youtube-download-bot

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:7.11
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-api-data:/var/lib/telegram-bot-api
    networks:
      - internal
    # No ports exposed to host — only internal network
    security_opt:
      - no-new-privileges:true
    # cap_drop: ALL not viable — third-party image needs unknown capabilities at startup
    mem_limit: 256m
    cpus: "0.5"
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8081 2>&1 | grep -qv 'Connection refused'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  bot:
    # Local dev: built from source. Production: pulled from GHCR via GHCR_IMAGE in .env
    image: ${GHCR_IMAGE:-youtube-download-bot}
    build: .
    restart: unless-stopped
    depends_on:
      telegram-bot-api:
        condition: service_healthy
    env_file: .env
    environment:
      TELEGRAM_LOCAL_SERVER_URL: http://telegram-bot-api:8081
    extra_hosts:
      - "host.docker.internal:10.0.0.65"
    volumes:
      - ./cache:/app/cache:rw
    networks:
      - internal
    # Hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=512m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    healthcheck:
      # /proc/1/comm contains just the executable name (e.g. "python3"),
      # which is stable across Python releases and doesn't depend on
      # argv[0] content like the old /proc/1/cmdline grep did.
      test: ["CMD-SHELL", "grep -qi python /proc/1/comm 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: "1.5"
    # No ports — bot only needs outbound connections

networks:
  internal:
    driver: bridge
    internal: false  # needs internet for YouTube

volumes:
  telegram-api-data:
